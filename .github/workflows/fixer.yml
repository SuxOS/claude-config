name: Fixer

# Proposer stage: scans this repo, files bugs/features as issues with confidence labels.
# Never opens a PR, never queues for build (the reusable's own logic or a human applies
# `queued-for-build`). Runs on the Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN),
# not a metered API key.
# Reusable workflow: SuxOS/.github/.github/workflows/fixer.yml — see its design doc.

on:
  schedule:
    # Deep tier of the 3-cadence proposer (see fixer-bugs.yml 15m / fixer-30m.yml 30m):
    # bugs + feature ideas + an explicit push for at least one ambitious/large idea per pass.
    - cron: "26 6 */3 * *" # Fixer Cadence v2: warm-tier every 3rd day ambitious-idea sweep
  workflow_dispatch:

jobs:
  fixer:
    # Default GITHUB_TOKEN perms are read-only; a reusable requesting more than the caller
    # grants fails at startup. Grant exactly what fixer.yml needs.
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: SuxOS/.github/.github/workflows/fixer.yml@main
    with:
      scope: deep
      max-turns: 40
    secrets: inherit
