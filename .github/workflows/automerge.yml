name: Auto-merge

# Enables GitHub NATIVE auto-merge on eligible, trusted-author PRs; never force-merges.
# Uses pull_request_target (base-repo context, write token) but never checks out PR code
# — only reads the event payload and calls the API. required-gates lists only the
# org-wide ruleset gate (`security-review`). This repo's own required check
# (`shellcheck`) is STILL independently enforced by a live per-repo ruleset — #669
# intended to fold it into the org ruleset and retire the per-repo one, but only this
# required-gates trim landed before the issue closed; the rest is tracked in #717.
# Don't read the trimmed list here as "shellcheck stopped being required" — it hasn't.
#
# ROUTING: required-gates must match a LIVE ruleset requirement (checked via
# assert-branch-protection's subset match, not exact-match). Adding a gate here that
# isn't actually required anywhere makes the reusable refuse to arm — see .github#700.
# Any issue that asks to add a required check must route to `needs-human` (or be split
# so the required-gates edit lands in the same window as the admin ruleset change); an
# autonomous code-only builder cannot finish it.
# Reusable workflow: SuxOS/.github/.github/workflows/automerge.yml

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled, edited]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  enable-automerge:
    permissions:
      contents: write
      pull-requests: write
    uses: SuxOS/.github/.github/workflows/automerge.yml@main
    with:
      required-gates: |
        security-review
    secrets: inherit
