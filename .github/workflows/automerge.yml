name: Auto-merge

# Enables GitHub NATIVE auto-merge on eligible, trusted-author PRs; never force-merges.
# Uses pull_request_target (base-repo context, write token) but never checks out PR code
# — only reads the event payload and calls the API. Org rulesets (SuxOS/.github#669)
# require only `security-review` fleet-wide — no per-repo CI job (e.g. shellcheck) is a
# required status check anymore.
#
# ROUTING: required-gates must match the org ruleset EXACTLY. Adding or renaming a required
# gate here is NOT a code-only change — it needs a paired repo-admin ruleset edit that lives
# outside this tree, or the reusable stops arming and auto-merge stalls (see .github#700). Any
# issue that asks to add a required check must route to `needs-human` (or be split so the
# required-gates edit lands in the same window as the admin ruleset change); an autonomous
# code-only builder cannot finish it.
# Reusable workflow: SuxOS/.github/.github/workflows/automerge.yml

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled, edited]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]

jobs:
  enable-automerge:
    permissions:
      contents: write
      pull-requests: write
    uses: SuxOS/.github/.github/workflows/automerge.yml@main
    with:
      required-gates: |
        security-review
    secrets: inherit
