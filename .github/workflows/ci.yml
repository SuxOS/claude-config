name: CI

# Repo-local CI gate for claude-config. This repo ships no Node package (dotfiles +
# shell + docs), so the shared SuxOS/.github ci.yml reusable — which hard-runs `npm ci`
# — can't be used here; it would fail on the missing package.json. Instead we run the
# checks that actually fit this repo's content, ALL inside one job named `shellcheck`
# (see the job comment): shellcheck over every tracked shell script PLUS the config-integrity
# linters (settings / hooks / json / evals). Named `shellcheck` so the main-branch ruleset
# can require the whole suite as the auto-merge gate (same role "Type-check & build" plays for
# the Worker repos). Mirrors the pattern .github itself uses (self-check.yml / actionlint) for
# a repo with no app to build.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The single REQUIRED auto-merge gate. Named `shellcheck` because that is the check name the
  # main-branch ruleset requires (see automerge.yml) — but it runs the repo's FULL integrity suite,
  # not just shellcheck. The settings-lint / hooks-test / json-validate / evals-lint checks used to
  # be separate ADVISORY jobs that native auto-merge ignored (it only waits on ruleset-required
  # checks), so a PR could break settings.json, corrupt a hook's exit contract, or ship malformed
  # JSON and still auto-merge on a green shellcheck+security-review — exactly the fail-silent class
  # these checks exist to catch (#122). Folding them into this one required job hard-blocks merge
  # with ZERO ruleset change — the code-only path around the needs-human ruleset edit (#92).
  #
  # NAMING SMELL, accepted deliberately: this job does more than shellcheck. The clean alternative —
  # an umbrella job renamed to e.g. `config-integrity` — needs a paired main-branch ruleset edit to
  # require the new name, which is the needs-human step #92 was routed to; an autonomous code-only
  # builder can't land that. When a human makes that ruleset edit, split these back into named jobs
  # and require each. Until then: KEEP THEM FOLDED HERE — splitting them back into standalone jobs
  # silently un-gates them (see CLAUDE.md). Each integrity step uses `if: ${{ !cancelled() }}` so
  # every check still runs and reports even when an earlier one fails (full signal in one CI run).
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: shellcheck tracked shell scripts
        run: |
          set -euo pipefail
          # git-tracked *.sh only — never the gitignored .claude/worktrees copies.
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no tracked shell scripts to check"; exit 0
          fi
          printf 'checking: %s\n' "${files[@]}"
          shellcheck "${files[@]}"

      # actionlint (#84): the 7 workflow files under .github/workflows/ are agent-editable and,
      # until now, never linted — cron expressions, `permissions` blocks, and `if:` expressions
      # (e.g. issue-build.yml:19) could break silently until they actually fired. Mirrors the
      # pattern .github itself uses (self-check.yml / actionlint), folded into this required job
      # for the same reason as the other integrity steps above (see CLAUDE.md).
      - name: lint GitHub Actions workflow files
        if: ${{ !cancelled() }}
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color

      # settings-lint (was an advisory job): lints home/.claude/settings.json for permission rules
      # that fail OPEN with no Claude Code warning (unnamespaced MCP denies, argument-constraining
      # Bash denies, allow/deny overlaps) — the traps settings.README.md documents (#82).
      - name: lint settings.json permission rules
        if: ${{ !cancelled() }}
        run: python3 .github/scripts/lint-settings.py

      # hooks-test (was advisory): byte-compiles every tracked *.py and asserts each live hook's
      # documented exit-code contract (2 = block, 0 = allow) against synthetic hook-input JSON, so a
      # broken hook can't merge silently as a wedged session or a neutered gate (#40, #41).
      - name: compile and exercise the Python hooks
        if: ${{ !cancelled() }}
        run: bash tests/test_hooks.sh

      # ruff/pyflakes (#292): py_compile (above) only catches syntax errors, not runtime defects
      # like #272 (a hook that can crash with an unhandled TypeError, breaking its documented
      # fail-open contract) — undefined names, unused imports, and similar Pyflakes-class checks
      # generalize that bug class across every tracked *.py instead of relying on a human to spot
      # the next one. Scoped to `--select F` (ruff's Pyflakes-equivalent rule set) only, NOT ruff's
      # broader default (which also includes pycodestyle style rules like E702 "multiple statements
      # on one line") — this codebase's hooks deliberately chain compact `i += 1; continue`-style
      # statements throughout _hookutil.py and friends, a real style choice, not a defect; a
      # style-rule linter would flag dozens of intentional lines with nothing to fix. Folded into
      # this required job for the same auto-merge-gating reason as the other integrity steps
      # (CLAUDE.md).
      - name: lint Python hooks/scripts with ruff (pyflakes rules)
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet ruff
          mapfile -t files < <(git ls-files '*.py')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no tracked Python files to lint"; exit 0
          fi
          python3 -m ruff check --select F "${files[@]}"

      # argv-canon fuzzer (#199): tests/test_hooks.sh only covers hand-picked bypass shapes;
      # this generates the combinatorial wrapper/flag/env/grouping space from an independent
      # reference grammar and asserts strip_prefixes()/block-egress's offending() recover the
      # real command word regardless of the combination — folded into this one required job for
      # the same auto-merge-gating reason as the other integrity steps (CLAUDE.md).
      - name: fuzz the shared argv-canonicalization logic
        if: ${{ !cancelled() }}
        run: python3 tests/fuzz_argv_canon.py

      # json-validate (was advisory): settings.json, fabric.json, and the skill evals.json files are
      # hand- and agent-edited and fail silently when malformed — Claude Code just ignores/rejects
      # them. Every tracked *.json must parse (#65).
      - name: validate tracked JSON files parse
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files '*.json')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no tracked JSON files to validate"; exit 0
          fi
          fail=0
          for f in "${files[@]}"; do
            if err=$(python3 -m json.tool "$f" 2>&1 >/dev/null); then
              echo "  ok: $f"
            else
              echo "  FAIL: $f" >&2
              echo "$err" >&2
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "JSON VALIDATION FAILED" >&2
            exit 1
          fi
          echo "all tracked JSON files parse"

      # evals-lint (was advisory): proves the skill eval fixtures (home/.claude/skills/*/evals/
      # evals.json) are still a usable test corpus — non-empty prompt + gradable expected_output,
      # unique ids, skill_name matches its directory — so a hand-/agent-authored eval can't go
      # structurally inert unnoticed (#95).
      - name: lint skill eval fixtures
        if: ${{ !cancelled() }}
        run: python3 .github/scripts/lint-evals.py

      # hooks-doc-lint (#269): hooks/README.md has needed a standalone "fix the stale doc" issue
      # at least six separate times (#103, #124, #169, #216, #223, #249) — every time a hook gains
      # a predicate or changes its matcher, the prose silently falls behind. Mirrors lint-settings.py
      # (#82): turns the two mechanically-extractable drift shapes (a hook's settings.json matcher
      # vs its README bullet; block-destructive-git.py's dispatched-predicate count vs the count
      # named in prose) into an enforced check instead of a recurring hand-fix. Deterministic, no
      # secrets/model call, so folded into this required job like the other integrity linters
      # rather than a standalone advisory job (see CLAUDE.md).
      - name: lint hooks/README.md for drift from settings.json / hook source
        if: ${{ !cancelled() }}
        run: python3 .github/scripts/lint-hooks-doc.py

      # doc-facts (#278): generalizes hooks-doc-lint's one-file-pair drift check into a mechanism
      # any tracked doc can use — a `<!-- doc-fact: ... -->` annotation asserts a concrete,
      # checkable claim (a file exists/doesn't, a settings.json deny rule is present, a regex
      # matches N times) next to the prose making that claim, verified here against live repo
      # state instead of trusting the prose to stay in sync by hand. Complements, doesn't replace,
      # hooks-doc-lint's two hand-built checks above. Deterministic, no secrets/model call, so
      # folded into this required job like the other integrity linters (see CLAUDE.md).
      - name: lint doc-fact annotations against live repo state
        if: ${{ !cancelled() }}
        run: python3 .github/scripts/lint-doc-facts.py

  # skill-evals (ADVISORY, #140): runs each skill's evals.json against a model and grades the
  # resulting response with an LLM judge — the runner layer #95 envisioned above the deterministic
  # evals-lint rail (which only checks eval SHAPE). A model call means cost + secrets + non-determinism,
  # so this is deliberately a STANDALONE ADVISORY job, NOT folded into the ruleset-required `shellcheck`
  # job: native auto-merge only waits on required checks (see automerge.yml required-gates), so this
  # never blocks merge. The runner SKIPS cleanly (exit 0) when there is no model access — no `claude`
  # CLI on PATH, or no auth token — so with no ANTHROPIC_API_KEY secret configured here it is a green
  # no-op today, and stays one until a human installs the CLI and adds the secret. See
  # .github/scripts/run-skill-evals.py for the full gate-vs-advisory design.
  skill-evals:
    name: skill-evals
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: run skill evals (advisory; skips cleanly when no model access)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/run-skill-evals.py

  # fuzz-argv-exec (ADVISORY, #228): checks the wrapper/sudo prefix shapes tests/fuzz_argv_canon.py
  # already covers against GROUND TRUTH — actually execs `<prefix> <argv-echoing helper>` via real
  # env/timeout/nice/xargs/stdbuf/exec/sudo binaries and diffs their observed argv against what
  # `_hookutil.strip_prefixes()` predicts — instead of only a second hand-authored reference table
  # (which can be wrong in the same direction as the implementation; see tests/fuzz_argv_exec.py's
  # module docstring for the `env -S`/#227 case that motivated this). Depends on real system
  # binaries' exact installed behavior (available wrappers, sudo policy, coreutils version), a
  # strictly riskier dependency for a hard merge gate than the pure-computation fuzzer already
  # folded into the required `shellcheck` job — so, same reasoning as skill-evals above, this is a
  # STANDALONE ADVISORY job, never folded in.
  fuzz-argv-exec:
    name: fuzz-argv-exec
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: fuzz argv canonicalization against real subprocess execution
        run: python3 tests/fuzz_argv_exec.py

  # fuzz-git-state (ADVISORY, #310): tests/fuzz_argv_canon.py/fuzz_argv_exec.py cover the
  # argv-CANONICALIZATION half of block-destructive-git.py's rails; this covers the other half —
  # the predicates that consult LIVE git repo state (force-push fast-forward, clean -n preview,
  # branch merged-into-HEAD, working-tree dirtiness) — against ground truth obtained by actually
  # performing the real git action in a disposable repo copy, not a second guess through the same
  # git plumbing the predicate itself already trusts. Standalone ADVISORY job, never folded into
  # the required `shellcheck` job — same reasoning as fuzz-argv-exec/skill-evals (CLAUDE.md): this
  # depends on real git subprocess behavior across many generated repo states, a heavier and
  # slower dependency than the pure-computation fuzzer already folded into the required job.
  fuzz-git-state:
    name: fuzz-git-state
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: fuzz block-destructive-git.py's git-state predicates against real git ground truth
        run: python3 tests/fuzz_git_state.py

  # `bash -n install.sh` only catches parse errors, not logic bugs (wrong case glob, broken
  # idempotency check, etc). This actually runs the script end-to-end against a scratch HOME
  # and checks the result, then runs it a second time to assert idempotency (#42).
  install-smoke:
    name: install-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: run install.sh against a scratch HOME, twice
        run: |
          set -euo pipefail
          scratch_home="$(mktemp -d)"
          HOME="$scratch_home" bash install.sh

          shopt -s dotglob
          for entry in home/.claude/*; do
            name="$(basename "$entry")"
            case "$name" in
              # settings.json + the settings.bot.json variant are COPIED per identity (install.sh),
              # not symlinked — mirror install.sh's own skip list. CLAUDE.md is symlinked but checked
              # separately below.
              settings.json|settings.bot.json) continue ;;
              CLAUDE.md) continue ;;
            esac
            link="$scratch_home/.claude/$name"
            [ -L "$link" ] || { echo "expected symlink missing: $link" >&2; exit 1; }
          done
          shopt -u dotglob
          [ -L "$scratch_home/.claude/CLAUDE.md" ] || { echo "expected symlink missing: $scratch_home/.claude/CLAUDE.md" >&2; exit 1; }
          [ -e "$scratch_home/.claude/settings.json" ] || { echo "settings.json not copied" >&2; exit 1; }

          # second run must be a no-op: no errors, no new backups
          HOME="$scratch_home" bash install.sh
          shopt -s nullglob
          backups=("$scratch_home"/.claude/*.bak-*)
          shopt -u nullglob
          if [ "${#backups[@]}" -gt 0 ]; then
            echo "unexpected backups after idempotent re-run: ${backups[*]}" >&2
            exit 1
          fi
          echo "install.sh smoke test passed"

      # #334: a missing settings.json source must hard-fail (exit 1) the same way every other
      # tracked item does via missing=() — never a silent exit-0 no-op. Runs against a scratch
      # copy of the repo so this doesn't disturb the checkout the step above already verified.
      - name: install.sh hard-fails when settings.json's source is missing
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          scratch_repo="$(mktemp -d)"
          cp -r . "$scratch_repo"
          rm -f "$scratch_repo/home/.claude/settings.json"
          scratch_home="$(mktemp -d)"
          if out=$(HOME="$scratch_home" bash "$scratch_repo/install.sh" 2>&1); then
            echo "install.sh exited 0 with a missing settings.json source — should hard-fail (#334)" >&2
            echo "$out" >&2
            exit 1
          else
            echo "$out" | grep -q "settings.json" || { echo "expected the error to mention settings.json" >&2; echo "$out" >&2; exit 1; }
          fi
          [ -e "$scratch_home/.claude/settings.json" ] && { echo "settings.json should not have been created" >&2; exit 1; }
          echo "install.sh missing-settings.json hard-fail test passed (#334)"

      # #293: install.sh detected settings.json drift (missing_deny/missing_hooks) but only ever
      # printed it. Proves --apply actually patches the live settings.json: restores a hook
      # removed from a scratch copy, keeps a rule the "user" added that isn't in the repo
      # reference, and a second --apply is a no-op (no second backup, no further changes).
      # permissions.deny reference is [] since the 2026-07-22 owner decision (#449) — there is
      # no longer a reference rule to test "restored", so this only exercises the union-merge's
      # preservation of a user-added rule against an empty reference; hook restoration still
      # covers the missing-vs-reference merge path.
      - name: install.sh --apply merges missing settings.json drift, preserving user rules
        if: ${{ !cancelled() }}
        run: |
          set -euo pipefail
          scratch_home="$(mktemp -d)"
          HOME="$scratch_home" bash install.sh >/dev/null

          settings="$scratch_home/.claude/settings.json"
          python3 - "$settings" <<'PYEOF'
          import json, sys
          path = sys.argv[1]
          data = json.load(open(path))
          data["permissions"]["deny"].append("Bash(my-custom-user-rule *)")
          data["hooks"]["PreToolUse"] = [g for g in data["hooks"]["PreToolUse"] if g["matcher"] != "Write"]
          json.dump(data, open(path, "w"), indent=2)
          PYEOF

          HOME="$scratch_home" bash install.sh --apply

          python3 - "$settings" <<'PYEOF'
          import json, sys
          data = json.load(open(sys.argv[1]))
          deny = data["permissions"]["deny"]
          assert "Bash(my-custom-user-rule *)" in deny, "user-added deny rule was dropped"
          matchers = [g["matcher"] for g in data["hooks"]["PreToolUse"]]
          assert "Write" in matchers, "missing hook matcher group was not restored"
          PYEOF

          shopt -s nullglob
          backups=("$scratch_home"/.claude/settings.json.bak-*)
          shopt -u nullglob
          [ "${#backups[@]}" -eq 1 ] || { echo "expected exactly one settings.json backup, got: ${backups[*]}" >&2; exit 1; }

          # second --apply must be a no-op: no second backup, file unchanged
          before_hash="$(sha256sum "$settings")"
          HOME="$scratch_home" bash install.sh --apply
          after_hash="$(sha256sum "$settings")"
          [ "$before_hash" = "$after_hash" ] || { echo "settings.json changed on a second --apply run" >&2; exit 1; }
          shopt -s nullglob
          backups=("$scratch_home"/.claude/settings.json.bak-*)
          shopt -u nullglob
          [ "${#backups[@]}" -eq 1 ] || { echo "second --apply run created another backup: ${backups[*]}" >&2; exit 1; }

          echo "install.sh --apply merge test passed (#293)"
