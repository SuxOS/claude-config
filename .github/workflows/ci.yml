name: CI

# Repo-local CI gate for claude-config. This repo ships no Node package (dotfiles +
# shell + docs), so the shared SuxOS/.github ci.yml reusable — which hard-runs `npm ci`
# — can't be used here; it would fail on the missing package.json. Instead we run the
# check that actually fits this repo's content: shellcheck over every tracked shell
# script. Named `shellcheck` so the main-branch ruleset can require it as the auto-merge
# gate (same role "Type-check & build" plays for the Worker repos). Mirrors the pattern
# .github itself uses (self-check.yml / actionlint) for a repo with no app to build.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: shellcheck tracked shell scripts
        run: |
          set -euo pipefail
          # git-tracked *.sh only — never the gitignored .claude/worktrees copies.
          mapfile -t files < <(git ls-files '*.sh')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no tracked shell scripts to check"; exit 0
          fi
          printf 'checking: %s\n' "${files[@]}"
          shellcheck "${files[@]}"

  # Lints home/.claude/settings.json for permission rules that fail OPEN with no Claude Code
  # warning (unnamespaced MCP denies, argument-constraining Bash denies, allow/deny overlaps) —
  # the traps settings.README.md documents, now an enforced gate instead of a manual checklist
  # (#82). NOTE: to make this a hard auto-merge gate, add `settings-lint` to the main-branch
  # ruleset's required checks AND to automerge.yml's required-gates (the reusable refuses to arm
  # unless the ruleset requires the same names) — until then it runs advisory on every PR.
  settings-lint:
    name: settings-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: lint settings.json permission rules
        run: python3 .github/scripts/lint-settings.py

  # Verifies the Python hooks under home/.claude/hooks/ the way `shellcheck` verifies the *.sh
  # scripts: byte-compiles every tracked *.py (syntax/import regressions) and asserts each live
  # hook's documented exit-code contract (2 = block, 0 = allow) against synthetic hook-input JSON
  # — e.g. the subagent_type=fork exemption and the stop_hook_active self-limit. Without this a
  # broken hook merges silently and only surfaces at runtime as a wedged session or a neutered
  # gate (#40, #41). Advisory until added to the ruleset + automerge.yml required-gates in lockstep.
  hooks-test:
    name: hooks-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: compile and exercise the Python hooks
        run: bash tests/test_hooks.sh
