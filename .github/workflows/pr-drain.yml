name: PR drain (close-stale + reconcile)

# CLOSE-STALE + DIRTY-CONFLICT + RECONCILE, via the shared reusable.
# Reusable: SuxOS/.github/.github/workflows/pr-drain.yml
# Org rulesets (SuxOS/.github#669) require only `security-review` fleet-wide — no
# per-repo CI job is a required status check anymore. required-gates matches that, so
# RECONCILE's branch-protection assertion never re-arms auto-merge when it's missing.

on:
  schedule:
    - cron: "19 * * * *" # hourly
  workflow_dispatch:

jobs:
  drain:
    permissions:
      contents: write
      pull-requests: write
      issues: write
    uses: SuxOS/.github/.github/workflows/pr-drain.yml@main
    with:
      required-gates: |
        security-review
    secrets: inherit
